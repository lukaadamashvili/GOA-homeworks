<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>product preview</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <div class="card-image">
            <img src="images/image-product-desktop.jpg" alt="Gabrielle perfume">
        </div>
        <div class="card-content">
          <p class="category">PERFUME</p>

          <h1>Gabrielle Essence Eau De Parfum</h1>

          <p class="description">
            A floral,solar and voluptous interpretation composed by Olivier Polge, Perfumer-Creator for the House of CHANEL.
          </p>
          <div class="price">
            <p class="new-price">$149.99</p>
            <p class="old price">$169.99</p>
          </div>
          <button class="btn">
            <img src="images/icon-cart.svg" alt="">
            Add to cart
          </button>
        </div>
    </div>
</body>
</html>
