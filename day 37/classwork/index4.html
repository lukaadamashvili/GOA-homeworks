
<!-- /* grid-template-columns
   განსაზღვრავს რამდენი სვეტი იქნება grid-ში
   და თითოეულის სიგანეს */
grid-template-columns: repeat(3, 100px);

/* grid-template-rows
   განსაზღვრავს რამდენი რიგი იქნება grid-ში
   და თითოეულის სიმაღლეს */
grid-template-rows: 80px 120px;

/* grid-column
   აჩვენებს რომელ სვეტებზე განთავსდება ელემენტი */
grid-column: 1 / 3;

/* grid-row
   აჩვენებს რომელ რიგებზე განთავსდება ელემენტი */
grid-row: 2 / 4;

/* gap
   დაშორება grid ელემენტებს შორის */
gap: 10px;

/* z-index
   განსაზღვრავს რომელი ელემენტი იქნება ზემოდან */
z-index: 1;

/* grid-area
   ერთდროულად განსაზღვრავს row-start / column-start /
   row-end / column-end */
grid-area: 1 / 2 / 3 / 4;

/* grid-template-areas
   ვიზუალურად აწყობს grid-ის განლაგებას სახელების მიხედვით */
grid-template-areas:
  "header header header"
  "sidebar content content"
  "footer footer footer"; -->
